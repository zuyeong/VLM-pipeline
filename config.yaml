    name: "sdxl_inpaint"
    api_url: "http://127.0.0.1:7860/sdapi/v1/img2img"
    sd_model_checkpoint: "sd_xl_inpainting_1.0.safetensors [fe1b97fe65]"
    prompt: "background"
    negative_prompt: "person, figure, woman, man, character"
    sampler_name: "DPM++ 2M"
    steps: 20
    cfg_scale: 7
    seed: -1
    denoising_strength: 0.97
    mask_blur: 9
    inpainting_fill: 0
    inpaint_full_res: true
    inpaint_full_res_padding: 208
    soft_inpainting: true
    mask_dilate_px: 10

